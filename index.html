<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>js -> weather app </title>

    <!-- css  -->
    <link rel="stylesheet" href="./style.css">

    <!-- bootstrap  -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.rtl.min.css"
        integrity="sha384-CfCrinSRH2IR6a4e6fy2q6ioOX7O6Mtm1L9vRvFZ1trBncWmMePhzvafv7oIcWiW" crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body class="bg-light d-flex justify-content-center align-items-center vh-100">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <!-- جعبه اصلی -->
                <div class="glass-box shadow-lg rounded-4">
                    <div class="card-body p-4">

                        <h3 class="text-center mb-4 text-primary">
                            <i class="bi bi-cloud-sun"></i> آب و هوا
                        </h3>

                        <!-- فرم سرچ -->
                        <div class="input-group mb-3">
                            <input type="text" id="cityInput" class="form-control"
                                placeholder="نام شهر را وارد کنید...">
                            <button class="btn btn-primary" id="searchBtn"><i class="bi bi-search"></i></button>
                        </div>

                        <!-- نمایش نتایج -->
                        <div id="result" class="text-center"></div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="./app.js"></script>



</body>

</html>
